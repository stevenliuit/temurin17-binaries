name: Build Temurin JDK 17 from Source

on:
  workflow_dispatch:
    inputs:
      platforms:
        description: Platforms to build
        required: false
        default: linux-x64
        type: choice
        options:
          - linux-x64
          - linux-x64,linux-aarch64

jobs:
  build-linux-x64:
    name: Build Linux x64 (Source)
    runs-on: ubuntu-latest
    timeout-minutes: 600
    steps:
      - name: Checkout temurin-build scripts
        uses: actions/checkout@v4
        with:
          repository: adoptium/temurin-build
          path: temurin-build
          fetch-depth: 1
      - name: Checkout JDK 17 source
        uses: actions/checkout@v4
        with:
          repository: adoptium/jdk17u
          ref: master
          path: jdk17u
          fetch-depth: 1
      - name: Install Boot JDK 17
        run: |
          wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.9+9/OpenJDK17U-jdk_x64_linux_hotspot_17.0.9_9.tar.gz
          tar -xzf OpenJDK17U-jdk_x64_linux_hotspot_17.0.9_9.tar.gz
          echo "BOOT_JDK=$PWD/jdk-17.0.9+9" >> $GITHUB_ENV
          echo "$PWD/jdk-17.0.9+9/bin" >> $GITHUB_PATH
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libfreetype6-dev libcups2-dev libx11-dev libxext-dev libxrender-dev libxrandr-dev libxtst-dev libxt-dev libasound2-dev libffi-dev libfontconfig1-dev autoconf automake libtool make zip unzip ccache git wget curl python3
      - name: Build JDK
        run: |
          cd jdk17u
          chmod +x configure
          bash configure --with-boot-jdk="$BOOT_JDK" --disable-warnings-as-errors
          make images JOBS=$(nproc)
      - name: Package JDK
        run: |
          cd jdk17u
          JDK_DIR=$(find build -type d -path "*/images/jdk" 2>/dev/null | head -1)
          echo "JDK_DIR=$JDK_DIR"
          if [ -d "$JDK_DIR" ]; then
            tar -czf ../OpenJDK17U-jdk_x64_linux_hotspot_17.0.9+$(date +%Y%m%d%H%M).tar.gz -C "$(dirname $JDK_DIR)" jdk
          else
            echo "JDK directory not found"
            ls -la build/
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Temurin17-JDK17-linux-x64
          path: OpenJDK17U-jdk_x64_linux_hotspot_*.tar.gz
          retention-days: 30

  build-linux-aarch64:
    name: Build Linux aarch64 (Source)
    runs-on: [self-hosted, linux, aarch64]
    timeout-minutes: 600
    steps:
      - name: Checkout temurin-build scripts
        uses: actions/checkout@v4
        with:
          repository: adoptium/temurin-build
          path: temurin-build
          fetch-depth: 1
      - name: Checkout JDK 17 source
        uses: actions/checkout@v4
        with:
          repository: adoptium/jdk17u
          ref: master
          path: jdk17u
          fetch-depth: 1
      - name: Install Boot JDK 17
        run: |
          wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.9+9/OpenJDK17U-jdk_aarch64_linux_hotspot_17.0.9_9.tar.gz
          tar -xzf OpenJDK17U-jdk_aarch64_linux_hotspot_17.0.9_9.tar.gz
          echo "BOOT_JDK=$PWD/jdk-17.0.9+9" >> $GITHUB_ENV
          echo "$PWD/jdk-17.0.9+9/bin" >> $GITHUB_PATH
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libfreetype6-dev libcups2-dev libx11-dev libxext-dev libxrender-dev libxrandr-dev libxtst-dev libxt-dev libasound2-dev libffi-dev libfontconfig1-dev autoconf automake libtool make zip unzip ccache git wget curl python3
      - name: Build JDK
        run: |
          cd jdk17u
          chmod +x configure
          bash configure --with-boot-jdk="$BOOT_JDK" --disable-warnings-as-errors
          make images JOBS=$(nproc)
      - name: Package JDK
        run: |
          cd jdk17u
          JDK_DIR=$(find build -type d -path "*/images/jdk" 2>/dev/null | head -1)
          echo "JDK_DIR=$JDK_DIR"
          if [ -d "$JDK_DIR" ]; then
            tar -czf ../OpenJDK17U-jdk_aarch64_linux_hotspot_17.0.9+$(date +%Y%m%d%H%M).tar.gz -C "$(dirname $JDK_DIR)" jdk
          else
            echo "JDK directory not found"
            ls -la build/
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Temurin17-JDK17-linux-aarch64
          path: OpenJDK17U-jdk_aarch64_linux_hotspot_*.tar.gz
          retention-days: 30