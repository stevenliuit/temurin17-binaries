name: Build Temurin JDK 17 from Source

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Build type
        required: false
        default: release
        type: choice
        options:
          - release
          - fastdebug
          - debug
      platforms:
        description: Platforms to build
        required: false
        default: linux-x64
        type: choice
        options:
          - linux-x64
          - linux-x64,windows-x64
          - linux-x64,macos-x64

  push:
    branches:
      - main
    tags:
      - jdk-17-src-*

jobs:
  build-linux-x64:
    name: Build Linux x64 (Source)
    runs-on: ubuntu-20.04
    timeout-minutes: 600
    
    steps:
      - name: Checkout temurin-build scripts
        uses: actions/checkout@v4
        with:
          repository: adoptium/temurin-build
          path: temurin-build
          fetch-depth: 1
      
      - name: Checkout JDK 17 source
        uses: actions/checkout@v4
        with:
          repository: adoptium/jdk17u
          ref: master
          path: jdk17u
          fetch-depth: 1
      
      - name: Install Boot JDK 17
        run: |
          wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.9+9/OpenJDK17U-jdk_x64_linux_hotspot_17.0.9_9.tar.gz
          tar -xzf OpenJDK17U-jdk_x64_linux_hotspot_17.0.9_9.tar.gz
          echo "BOOT_JDK=$PWD/jdk-17.0.9+9" >> $GITHUB_ENV
          echo "$PWD/jdk-17.0.9+9/bin" >> $GITHUB_PATH
      
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libfreetype6-dev libcups2-dev \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev \
            libxtst-dev libasound2-dev libffi-dev libfontconfig1-dev \
            autoconf automake libtool make zip unzip ccache \
            git wget curl python3
      
      - name: Build JDK
        run: |
          cd jdk17u
          chmod +x ../temurin-build/makejdk-any-platform.sh
          ../temurin-build/makejdk-any-platform.sh \
            -J "$BOOT_JDK" \
            --build-variant hotspot \
            --build-number b$(date +%Y%m%d%H%M) \
            --disable-shallow-git-clone \
            jdk17u
      
      - name: Package JDK
        run: |
          cd jdk17u
          JDK_DIR=$(find build -type d -name "jdk*" 2>/dev/null | head -1)
          if [ -d "$JDK_DIR" ]; then
            tar -czf ../OpenJDK17U-jdk_x64_linux_hotspot_17.0.9+$(date +%Y%m%d%H%M).tar.gz -C "$(dirname $JDK_DIR)" jdk
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Temurin17-JDK17-linux-x64
          path: OpenJDK17U-jdk_x64_linux_hotspot_*.tar.gz
          retention-days: 30
