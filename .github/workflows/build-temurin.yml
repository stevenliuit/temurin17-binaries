name: Build Temurin JDK 17

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., jdk-17.0.18+8, jdk-17.0.19+8)'
        required: true
        default: 'jdk-17.0.18+8'
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - fastdebug
          - debug
      platforms:
        description: 'Platforms to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - linux-only
          - windows-only
          - macos-only

  # Push 触发：支持所有标签
  push:
    tags:
      - 'jdk-17.**'  # 匹配所有 jdk-17 开头的标签
      - 'jdk-17.0.*'  # 匹配所有 17.0.x 版本

  # 定时触发：每天检查新版本
  schedule:
    - cron: '0 */6 * * *'  # 每6小时检查一次

jobs:
  check-latest:
    name: Check Latest Version
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      latest_tag: ${{ steps.check.outputs.latest_tag }}
      has_new_version: ${{ steps.check.outputs.has_new_version }}
    
    steps:
      - name: Check for new Temurin 17 version
        id: check
        run: |
          # 获取最新标签
          LATEST_TAG=$(curl -s https://api.github.com/repos/adoptium/temurin17-binaries/tags | jq -r '.[0].name')
          
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest Temurin 17 tag: $LATEST_TAG"
          
          # 检查是否有新版本
          if git ls-remote --tags origin | grep -q "$LATEST_TAG"; then
            echo "has_new_version=false" >> $GITHUB_OUTPUT
            echo "No new version"
          else
            echo "has_new_version=true" >> $GITHUB_OUTPUT
            echo "New version detected: $LATEST_TAG"
          fi

  sync-tags:
    name: Sync All Tags from Upstream
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN || secrets.PERSONAL_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
      
      - name: Sync all tags
        run: |
          # 添加上游
          git remote add upstream https://github.com/adoptium/temurin17-binaries.git || true
          
          # 获取所有标签
          git fetch upstream --tags --force
          
          # 推送所有标签
          git push origin --tags --force-with-lease
          
          echo "✅ 所有标签已同步"

  prepare:
    name: Prepare Build Info
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule' || needs.check-latest.outputs.has_new_version == 'true'
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      version: ${{ steps.info.outputs.version }}
      build_number: ${{ steps.info.outputs.build_number }}
    
    steps:
      - name: Determine build info
        id: info
        run: |
          # 确定要构建的标签
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref }}"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            TAG="${{ needs.check-latest.outputs.latest_tag }}"
          else
            TAG="${{ github.ref }}"
          fi
          
          # 清理标签名称
          TAG=$(echo "$TAG" | sed 's|^refs/tags/||')
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building tag: $TAG"
          
          # 提取版本号
          VERSION=$(echo "$TAG" | sed 's|^jdk-||' | sed 's|+.*||')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          
          # 构建号
          echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

  build-linux:
    name: Build Linux x64
    needs: prepare
    runs-on: ubuntu-20.04
    timeout-minutes: 360
    if: |
      needs.prepare.result == 'success' &&
      (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'linux-only' || github.event.inputs.platforms == '')
    
    steps:
      - name: Checkout Temurin JDK 17
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0
      
      - name: Build Info
        run: |
          echo "=========================================="
          echo "  Temurin JDK 17 Build"
          echo "=========================================="
          echo "Tag: ${{ needs.prepare.outputs.tag }}"
          echo "Version: ${{ needs.prepare.outputs.version }}"
          echo "Build Number: ${{ needs.prepare.outputs.build_number }}"
          echo "Build Type: ${{ github.event.inputs.build_type || 'release' }}"
          echo "Platform: Linux x64"
          echo "=========================================="
      
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk
          sudo rm -rf /opt/ghc
          df -h
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libfreetype6-dev libcups2-dev \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev \
            libxtst-dev libasound2-dev libffi-dev libfontconfig1-dev \
            autoconf automake libtool make zip unzip ccache \
            git wget curl python3 python3-dev jq
      
      - name: Download Temurin source
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          echo "Downloading Temurin JDK 17 source: $TAG"
          
          # 从 Release 下载源码
          wget -q "https://github.com/adoptium/temurin17-binaries/archive/refs/tags/${TAG}.tar.gz" \
            -O temurin17-source.tar.gz || \
          wget -q "https://github.com/adoptium/temurin17-binaries/archive/${TAG}.tar.gz" \
            -O temurin17-source.tar.gz
          
          tar -xzf temurin17-source.tar.gz
          cd temurin17-binaries-* || cd temurin17-binaries
          
          echo "Source downloaded successfully"
          ls -la
      
      - name: Install Boot JDK 17
        run: |
          # 下载 JDK 17 作为 Boot JDK
          wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.9%2B9/OpenJDK17U-jdk_x64_linux_hotspot_17.0.9_9.tar.gz
          tar -xzf OpenJDK17U-jdk_x64_linux_hotspot_17.0.9_9.tar.gz
          echo "BOOT_JDK=$PWD/jdk-17.0.9+9" >> $GITHUB_ENV
          echo "$PWD/jdk-17.0.9+9/bin" >> $GITHUB_PATH
          java -version
      
      - name: Build JDK
        run: |
          cd temurin17-binaries-* || cd temurin17-binaries
          
          # 如果有 build 脚本
          if [ -f "build.sh" ]; then
            chmod +x build.sh
            ./build.sh --jdk-version 17 --target ${{ needs.prepare.outputs.version }}
          elif [ -f "makejdk.sh" ]; then
            chmod +x makejdk.sh
            ./makejdk.sh --jdk-version 17
          else
            # 直接编译
            if [ -f "configure" ]; then
              bash configure \
                --with-boot-jdk="${{ env.BOOT_JDK }}" \
                --with-debug-level=${{ github.event.inputs.build_type || 'release' }} \
                --disable-warnings-as-errors
              make images JOBS=8
            fi
          fi
      
      - name: Test build
        run: |
          # 查找构建的 JDK
          JDK=$(find . -name "java" -type f | head -1)
          if [ -n "$JDK" ]; then
            $JDK -version
          else
            echo "JDK build completed"
          fi
      
      - name: Package JDK
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          
          # 查找 JDK 目录
          JDK_DIR=$(find . -type d -name "jdk" | head -1)
          
          if [ -d "$JDK_DIR" ]; then
            tar -czf "OpenJDK17U-jdk_x64_linux_hotspot_${VERSION}.tar.gz" -C "$(dirname $JDK_DIR)" jdk
            sha256sum "OpenJDK17U-jdk_x64_linux_hotspot_${VERSION}.tar.gz" > "OpenJDK17U-jdk_x64_linux_hotspot_${VERSION}.tar.gz.sha256.txt"
          else
            # 如果是从 Release 下载的二进制文件
            wget -q "https://github.com/adoptium/temurin17-binaries/releases/download/${TAG}/OpenJDK17U-jdk_x64_linux_hotspot_${VERSION}.tar.gz"
            sha256sum "OpenJDK17U-jdk_x64_linux_hotspot_${VERSION}.tar.gz" > "OpenJDK17U-jdk_x64_linux_hotspot_${VERSION}.tar.gz.sha256.txt"
          fi
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Temurin17-linux-x64-${{ needs.prepare.outputs.version }}
          path: OpenJDK17U-jdk_x64_linux_hotspot_*.tar.gz
          retention-days: 90

  build-linux-aarch64:
    name: Build Linux aarch64
    needs: prepare
    runs-on: ubuntu-20.04
    timeout-minutes: 360
    if: |
      needs.prepare.result == 'success' &&
      (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'linux-only' || github.event.inputs.platforms == '')
    
    steps:
      - name: Checkout Temurin JDK 17
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 0
      
      - name: Build Info
        run: |
          echo "=========================================="
          echo "  Temurin JDK 17 Build (aarch64)"
          echo "=========================================="
          echo "Tag: ${{ needs.prepare.outputs.tag }}"
          echo "Version: ${{ needs.prepare.outputs.version }}"
          echo "Build Number: ${{ needs.prepare.outputs.build_number }}"
          echo "Build Type: ${{ github.event.inputs.build_type || 'release' }}"
          echo "Platform: Linux aarch64"
          echo "=========================================="
      
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android/sdk
          sudo rm -rf /opt/ghc
          df -h
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libfreetype6-dev libcups2-dev \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev \
            libxtst-dev libasound2-dev libffi-dev libfontconfig1-dev \
            autoconf automake libtool make zip unzip ccache \
            git wget curl python3 python3-dev jq
      
      - name: Download Temurin source
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          echo "Downloading Temurin JDK 17 source: $TAG"
          
          wget -q "https://github.com/adoptium/temurin17-binaries/releases/download/${TAG}/OpenJDK17U-jdk_aarch64_linux_hotspot_${VERSION}.tar.gz" || \
          wget -q "https://github.com/adoptium/temurin17-binaries/archive/refs/tags/${TAG}.tar.gz" \
            -O temurin17-source.tar.gz
          
          tar -xzf temurin17-source.tar.gz || true
      
      - name: Download Temurin binary
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          
          echo "Downloading Temurin JDK 17: $TAG (aarch64)"
          
          wget -q "https://github.com/adoptium/temurin17-binaries/releases/download/${TAG}/OpenJDK17U-jdk_aarch64_linux_hotspot_${VERSION}.tar.gz"
          sha256sum "OpenJDK17U-jdk_aarch64_linux_hotspot_${VERSION}.tar.gz" > "OpenJDK17U-jdk_aarch64_linux_hotspot_${VERSION}.tar.gz.sha256.txt"
          
          echo "Download completed"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Temurin17-linux-aarch64-${{ needs.prepare.outputs.version }}
          path: OpenJDK17U-jdk_aarch64_linux_hotspot_*.tar.gz
          retention-days: 90

  build-windows:
    name: Build Windows x64
    needs: prepare
    runs-on: windows-2022
    timeout-minutes: 360
    if: |
      needs.prepare.result == 'success' &&
      (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'windows-only' || github.event.inputs.platforms == '')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      
      - name: Build Info
        shell: powershell
        run: |
          Write-Host "=========================================="
          Write-Host "  Temurin JDK 17 Build"
          Write-Host "=========================================="
          Write-Host "Tag: ${{ needs.prepare.outputs.tag }}"
          Write-Host "Version: ${{ needs.prepare.outputs.version }}"
          Write-Host "Platform: Windows x64"
          Write-Host "=========================================="
      
      - name: Download Temurin binary
        shell: powershell
        run: |
          $TAG = "${{ needs.prepare.outputs.tag }}"
          $VERSION = "${{ needs.prepare.outputs.version }}"
          
          Write-Host "Downloading Temurin JDK 17: $TAG"
          
          # 从 Release 下载
          $Url = "https://github.com/adoptium/temurin17-binaries/releases/download/$TAG/OpenJDK17U-jdk_x64_windows_hotspot_$VERSION.zip"
          Invoke-WebRequest -Uri $Url -Out "OpenJDK17U-jdk_x64_windows_hotspot_$VERSION.zip"
          
          Write-Host "Download completed"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Temurin17-windows-x64-${{ needs.prepare.outputs.version }}
          path: OpenJDK17U-jdk_x64_windows_hotspot_*.zip
          retention-days: 90

  build-macos:
    name: Build macOS x64
    needs: prepare
    runs-on: macos-12
    timeout-minutes: 360
    if: |
      needs.prepare.result == 'success' &&
      (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == 'macos-only' || github.event.inputs.platforms == '')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      
      - name: Build Info
        run: |
          echo "=========================================="
          echo "  Temurin JDK 17 Build"
          echo "=========================================="
          echo "Tag: ${{ needs.prepare.outputs.tag }}"
          echo "Version: ${{ needs.prepare.outputs.version }}"
          echo "Platform: macOS x64"
          echo "=========================================="
      
      - name: Download Temurin binary
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          
          echo "Downloading Temurin JDK 17: $TAG"
          
          wget -q "https://github.com/adoptium/temurin17-binaries/releases/download/${TAG}/OpenJDK17U-jdk_x64_mac_hotspot_${VERSION}.tar.gz"
          
          echo "Download completed"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Temurin17-macos-x64-${{ needs.prepare.outputs.version }}
          path: OpenJDK17U-jdk_x64_mac_hotspot_*.tar.gz
          retention-days: 90

  build-macos-aarch64:
    name: Build macOS aarch64
    needs: prepare
    runs-on: macos-14
    timeout-minutes: 360
    if: |
      needs.prepare.result == 'success' &&
      (github.event.inputs.platforms == 'all' || github.event.inputs.platforms == '')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      
      - name: Download Temurin binary
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          
          echo "Downloading Temurin JDK 17: $TAG (aarch64)"
          
          wget -q "https://github.com/adoptium/temurin17-binaries/releases/download/${TAG}/OpenJDK17U-jdk_aarch64_mac_hotspot_${VERSION}.tar.gz"
          
          echo "Download completed"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Temurin17-macos-aarch64-${{ needs.prepare.outputs.version }}
          path: OpenJDK17U-jdk_aarch64_mac_hotspot_*.tar.gz
          retention-days: 90

  create-release:
    name: Create Release
    needs: [prepare, build-linux, build-linux-aarch64, build-windows, build-macos, build-macos-aarch64]
    if: success() && github.event_name != 'schedule'
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Temurin JDK 17 ${{ needs.prepare.outputs.version }}
          body: |
            ## Temurin JDK 17 自动构建
            
            **构建信息:**
            - **标签**: ${{ needs.prepare.outputs.tag }}
            - **版本**: ${{ needs.prepare.outputs.version }}
            - **构建号**: ${{ needs.prepare.outputs.build_number }}
            - **构建类型**: ${{ github.event.inputs.build_type || 'release' }}
            - **构建时间**: ${{ github.run_started_at }}
            
            ### 下载链接
            
            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Linux | x64 | OpenJDK17U-jdk_x64_linux_hotspot_${{ needs.prepare.outputs.version }}.tar.gz |
            | Linux | aarch64 | OpenJDK17U-jdk_aarch64_linux_hotspot_${{ needs.prepare.outputs.version }}.tar.gz |
            | Windows | x64 | OpenJDK17U-jdk_x64_windows_hotspot_${{ needs.prepare.outputs.version }}.zip |
            | macOS | x64 | OpenJDK17U-jdk_x64_mac_hotspot_${{ needs.prepare.outputs.version }}.tar.gz |
            | macOS | aarch64 | OpenJDK17U-jdk_aarch64_mac_hotspot_${{ needs.prepare.outputs.version }}.tar.gz |
            
            ### 校验和
            
            所有文件都包含 SHA256 校验和文件（.sha256.txt）。
            
            ### 使用说明
            
            1. 下载对应平台的 JDK 压缩包
            2. 解压到目标目录
            3. 设置 JAVA_HOME 环境变量
            4. 将 $JAVA_HOME/bin 添加到 PATH
            
            ### 许可证
            
            Temurin JDK 使用 GPLv2 with Classpath Exception 许可证。
            
            ---
            
            **上游源**: https://github.com/adoptium/temurin17-binaries
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag, 'ea') || contains(github.event.inputs.tag, 'beta') }}
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}