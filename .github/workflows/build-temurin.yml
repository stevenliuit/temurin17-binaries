name: Build Tansun JDK 17

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., jdk-17.0.18+8, jdk-17.0.19+8)'
        required: true
        default: 'jdk-17.0.18+8'
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - release
          - fastdebug
          - debug

jobs:
  prepare:
    name: Prepare Build Info
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      version: ${{ steps.info.outputs.version }}
      build_number: ${{ steps.info.outputs.build_number }}

    steps:
      - name: Determine build info
        id: info
        run: |
          TAG="${{ github.event.inputs.tag }}"
          TAG=$(echo "$TAG" | sed 's|^refs/tags/||')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building tag: $TAG"
          VERSION=$(echo "$TAG" | sed 's|^jdk-||' | sed 's|+|_|')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "build_number=${{ github.run_number }}" >> $GITHUB_OUTPUT

  build-linux:
    name: Build Linux x64
    needs: prepare
    runs-on: ubuntu-20.04
    timeout-minutes: 480
    if: needs.prepare.result == 'success'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 1

      - name: Build Info
        run: |
          echo "=========================================="
          echo "  Tansun JDK 17 Build (Linux x64)"
          echo "=========================================="
          echo "Tag: ${{ needs.prepare.outputs.tag }}"
          echo "Version: ${{ needs.prepare.outputs.version }}"
          echo "=========================================="

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libfreetype6-dev libcups2-dev \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev \
            libxtst-dev libasound2-dev libffi-dev libfontconfig1-dev \
            autoconf automake libtool make zip unzip ccache \
            wget curl

      - name: Install Boot JDK
        run: |
          wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.9%2B9/OpenJDK17U-jdk_x64_linux_hotspot_17.0.9_9.tar.gz
          tar -xzf OpenJDK17U-jdk_x64_linux_hotspot_17.0.9_9.tar.gz
          echo "BOOT_JDK=$PWD/jdk-17.0.9+9" >> $GITHUB_ENV
          echo "$PWD/jdk-17.0.9+9/bin" >> $GITHUB_PATH

      - name: Patch JVM arguments for --add-opens
        run: |
          if [ -f "src/hotspot/share/runtime/arguments.cpp" ]; then
            sed -i '/add_property.*jdk.module.addopens/d' src/hotspot/share/runtime/arguments.cpp
            sed -i '/void Arguments::parse_each_vm_init.*/i add_property("jdk.module.addopens.0", "java.base/java.lang=ALL-UNNAMED", AddProperty); add_property("jdk.module.addopens.1", "java.base/java.util=ALL-UNNAMED", AddProperty); add_property("jdk.module.addopens.2", "java.base/java.base=ALL-UNNAMED", AddProperty); add_property("jdk.module.addopens.3", "java.base/java.lang.reflect=ALL-UNNAMED", AddProperty);' src/hotspot/share/runtime/arguments.cpp
            echo "Patched arguments.cpp for --add-opens"
            grep -A3 "jdk.module.addopens" src/hotspot/share/runtime/arguments.cpp
          else
            echo "arguments.cpp not found"
            exit 1
          fi

      - name: Configure and build
        run: |
          bash configure \
            --with-boot-jdk="${{ env.BOOT_JDK }}" \
            --with-debug-level=${{ github.event.inputs.build_type || 'release' }} \
            --with-vendor-name="Tansun" \
            --with-vendor-version-string="Tansun-17" \
            --disable-warnings-as-errors
          make images JOBS=8

      - name: Package JDK
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          JDK_DIR=$(find . -type d -name "jdk" | head -1)
          tar -czf "Tansun17U-jdk_x64_linux_hotspot_${VERSION}.tar.gz" -C "$(dirname $JDK_DIR)" jdk
          sha256sum "Tansun17U-jdk_x64_linux_hotspot_${VERSION}.tar.gz" > "Tansun17U-jdk_x64_linux_hotspot_${VERSION}.tar.gz.sha256.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tansun17-linux-x64-${{ needs.prepare.outputs.version }}
          path: Tansun17U-jdk_x64_linux_hotspot_*.tar.gz
          retention-days: 90

  build-linux-aarch64:
    name: Build Linux aarch64
    needs: prepare
    runs-on: ubuntu-20.04
    timeout-minutes: 480
    if: needs.prepare.result == 'success'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 1

      - name: Build Info
        run: |
          echo "=========================================="
          echo "  Tansun JDK 17 Build (Linux aarch64)"
          echo "=========================================="
          echo "Tag: ${{ needs.prepare.outputs.tag }}"
          echo "Version: ${{ needs.prepare.outputs.version }}"
          echo "=========================================="

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross \
            build-essential libfreetype6-dev libcups2-dev \
            libx11-dev libxext-dev libxrender-dev libxrandr-dev \
            libxtst-dev libasound2-dev libffi-dev libfontconfig1-dev \
            autoconf automake libtool make zip unzip ccache \
            wget curl

      - name: Install Boot JDK
        run: |
          wget -q https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.9%2B9/OpenJDK17U-jdk_x64_linux_hotspot_17.0.9_9.tar.gz
          tar -xzf OpenJDK17U-jdk_x64_linux_hotspot_17.0.9_9.tar.gz
          echo "BOOT_JDK=$PWD/jdk-17.0.9+9" >> $GITHUB_ENV
          echo "$PWD/jdk-17.0.9+9/bin" >> $GITHUB_PATH

      - name: Patch JVM arguments for --add-opens
        run: |
          if [ -f "src/hotspot/share/runtime/arguments.cpp" ]; then
            sed -i '/add_property.*jdk.module.addopens/d' src/hotspot/share/runtime/arguments.cpp
            sed -i '/void Arguments::parse_each_vm_init.*/i add_property("jdk.module.addopens.0", "java.base/java.lang=ALL-UNNAMED", AddProperty); add_property("jdk.module.addopens.1", "java.base/java.util=ALL-UNNAMED", AddProperty); add_property("jdk.module.addopens.2", "java.base/java.base=ALL-UNNAMED", AddProperty); add_property("jdk.module.addopens.3", "java.base/java.lang.reflect=ALL-UNNAMED", AddProperty);' src/hotspot/share/runtime/arguments.cpp
            echo "Patched arguments.cpp for --add-opens"
          else
            echo "arguments.cpp not found"
            exit 1
          fi

      - name: Configure and build
        run: |
          bash configure \
            --openjdk-target=aarch64-linux-gnu \
            --with-boot-jdk="${{ env.BOOT_JDK }}" \
            --with-debug-level=${{ github.event.inputs.build_type || 'release' }} \
            --with-vendor-name="Tansun" \
            --with-vendor-version-string="Tansun-17" \
            --disable-warnings-as-errors
          make images JOBS=8

      - name: Package JDK
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          JDK_DIR=$(find . -type d -name "jdk" | head -1)
          tar -czf "Tansun17U-jdk_aarch64_linux_hotspot_${VERSION}.tar.gz" -C "$(dirname $JDK_DIR)" jdk
          sha256sum "Tansun17U-jdk_aarch64_linux_hotspot_${VERSION}.tar.gz" > "Tansun17U-jdk_aarch64_linux_hotspot_${VERSION}.tar.gz.sha256.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tansun17-linux-aarch64-${{ needs.prepare.outputs.version }}
          path: Tansun17U-jdk_aarch64_linux_hotspot_*.tar.gz
          retention-days: 90

  build-windows:
    name: Build Windows x64
    needs: prepare
    runs-on: windows-2022
    timeout-minutes: 480
    if: needs.prepare.result == 'success'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 1

      - name: Build Info
        shell: powershell
        run: |
          Write-Host "=========================================="
          Write-Host "  Tansun JDK 17 Build (Windows x64)"
          Write-Host "=========================================="
          Write-Host "Tag: ${{ needs.prepare.outputs.tag }}"
          Write-Host "Version: ${{ needs.prepare.outputs.version }}"
          Write-Host "=========================================="

      - name: Install dependencies
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.9%2B9/OpenJDK17U-jdk_x64_windows_hotspot_17.0.9_9.zip" -OutFile "bootjdk.zip"
          Expand-Archive -Path bootjdk.zip -DestinationPath . -Force
          $env:BOOT_JDK = "$PWD\jdk-17.0.9+9"
          $env:PATH = "$env:BOOT_JDK\bin;$env:PATH"
          echo "BOOT_JDK=$env:BOOT_JDK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          java -version

      - name: Patch JVM arguments for --add-opens
        shell: powershell
        run: |
          $file = "src\hotspot\share\runtime\arguments.cpp"
          if (Test-Path $file) {
            $content = Get-Content $file -Raw
            $content = $content -replace '(add_property\("jdk\.module\.addopens.*?",.*?\);', ''
            $content = $content -replace '(void Arguments::parse_each_vm_init\*)', "`n  add_property(`"jdk.module.addopens.0`", `"java.base/java.lang=ALL-UNNAMED`", AddProperty);`n  add_property(`"jdk.module.addopens.1`", `"java.base/java.util=ALL-UNNAMED`", AddProperty);`n  add_property(`"jdk.module.addopens.2`", `"java.base/java.base=ALL-UNNAMED`", AddProperty);`n  add_property(`"jdk.module.addopens.3`", `"java.base/java.lang.reflect=ALL-UNNAMED`", AddProperty);`n`$1"
            Set-Content -Path $file -Value $content -NoNewline
            Write-Host "Patched arguments.cpp for --add-opens"
          } else {
            Write-Host "arguments.cpp not found"
            exit 1
          }

      - name: Configure and build
        shell: powershell
        run: |
          $env:BOOT_JDK = "$PWD\jdk-17.0.9+9"
          $env:PATH = "$env:BOOT_JDK\bin;$env:PATH"
          $version = "${{ needs.prepare.outputs.version }}"
          bash configure `
            --with-boot-jdk="$env:BOOT_JDK" `
            --with-debug-level=${{ github.event.inputs.build_type || 'release' }} `
            --with-vendor-name="Tansun" `
            --with-vendor-version-string="Tansun-17" `
            --disable-warnings-as-errors
          make images JOBS=8

      - name: Package JDK
        shell: powershell
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $JDK_DIR = Get-ChildItem -Directory | Where-Object { $_.Name -like "jdk*" } | Select-Object -First 1
          Compress-Archive -Path "$JDK_DIR\*" -DestinationPath "Tansun17U-jdk_x64_windows_hotspot_$VERSION.zip" -Force
          (Get-FileHash "Tansun17U-jdk_x64_windows_hotspot_$VERSION.zip" -Algorithm SHA256 | Select-Object -ExpandProperty Hash) + "  Tansun17U-jdk_x64_windows_hotspot_$VERSION.zip" | Out-File "Tansun17U-jdk_x64_windows_hotspot_$VERSION.zip.sha256.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tansun17-windows-x64-${{ needs.prepare.outputs.version }}
          path: Tansun17U-jdk_x64_windows_hotspot_*.zip
          retention-days: 90

  create-release:
    name: Create Release
    needs: [prepare, build-linux, build-windows, build-linux-aarch64]
    if: success() && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Tansun JDK 17 ${{ needs.prepare.outputs.version }}
          body: |
            ## Tansun JDK 17 自动构建
            
            **构建信息:**
            - **标签**: ${{ needs.prepare.outputs.tag }}
            - **版本**: ${{ needs.prepare.outputs.version }}
            - **构建号**: ${{ needs.prepare.outputs.build_number }}
            - **构建类型**: ${{ github.event.inputs.build_type || 'release' }}
            
            **特性:**
            - 自定义品牌: Tansun
            - 内置 --add-opens 配置 (java.lang, java.util, java.base, java.lang.reflect)
            
            ### 下载链接
            
            | 平台 | 架构 | 文件 |
            |------|------|------|
            | Linux | x64 | Tansun17U-jdk_x64_linux_hotspot_${{ needs.prepare.outputs.version }}.tar.gz |
            | Linux | aarch64 | Tansun17U-jdk_aarch64_linux_hotspot_${{ needs.prepare.outputs.version }}.tar.gz |
            | Windows | x64 | Tansun17U-jdk_x64_windows_hotspot_${{ needs.prepare.outputs.version }}.zip |
            
            ### 许可证
            GPLv2 with Classpath Exception
            
            ---
            **上游项目**: https://github.com/adoptium/temurin17-binaries
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag, 'ea') || contains(github.event.inputs.tag, 'beta') }}
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
